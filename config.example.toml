# DDaraBot configuration file
# Copy this file to config.toml and fill in the values.
# cp config.example.toml config.toml

[bluesky]
handle = "my-handle.bsky.social"
app_password = "xxxx-xxxx-xxxx-xxxx"      # env: DDARA_BLUESKY_APP_PASSWORD
pds_host = "https://bsky.social"

[jetstream]
url = "wss://jetstream2.us-east.bsky.network/subscribe"

[translation]
source_language = "ko"                     # BCP 47
target_languages = ["en", "ja", "zh"]      # BCP 47
trigger_hashtag = "ddara"
summarize_on_overflow = true
footer = "\n\n🌐 Translated by #DDaraBot"

[llm]
# Format: provider/model. Provider is auto-detected from the model name.
# Supported: openai/, anthropic/, googleai/, ollama/, vertexai/
model = "googleai/gemini-2.5-flash"

[llm.openai]
api_key = ""                               # env: OPENAI_API_KEY

[llm.anthropic]
api_key = ""                               # env: ANTHROPIC_API_KEY

[llm.googleai]
api_key = ""                               # env: GOOGLE_API_KEY

[llm.ollama]
server_address = "http://localhost:11434"
timeout = 60

[llm.vertexai]
project_id = ""
location = "us-central1"

[store]
path = "./ddarabot.db"

[log]
level = "info"
