name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build release binaries
        run: make release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            bin/ddarabot-linux-amd64
            bin/ddarabot-linux-arm64
            bin/ddarabot-darwin-amd64
            bin/ddarabot-darwin-arm64
